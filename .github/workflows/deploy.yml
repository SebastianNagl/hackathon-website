name: Build and deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/sebastiannagl/legallovestech

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure kubeconfig
        run: |
          mkdir -p "$RUNNER_TEMP/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$RUNNER_TEMP/.kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/.kube/config" >> "$GITHUB_ENV"

      - name: Apply manifests
        run: kubectl apply -f deploy/

      - name: Roll image
        run: |
          kubectl -n legallovestech set image \
            deployment/legallovestech-frontend \
            frontend=${{ env.IMAGE }}:${{ github.sha }}
          kubectl -n legallovestech rollout status \
            deployment/legallovestech-frontend --timeout=180s
